<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn Referral Assistant</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px;
        color: #111827;
        background: #ffffff;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        color: #004182;
      }
      p {
        font-size: 12px;
        color: #4b5563;
        margin: 0 0 10px;
        line-height: 1.4;
      }
      button {
        width: 100%;
        background: #0a66c2;
        color: white;
        border: 0;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #004182; }
      button:disabled { background: #9ca3af; cursor: not-allowed; }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #374151;
        white-space: pre-wrap;
      }
      .status.err { color: #b91c1c; }
      .row {
        margin-top: 8px;
        font-size: 11px;
        color: #6b7280;
      }
      a { color: #0a66c2; }
    </style>
  </head>
  <body>
    <h1>LinkedIn Referral Assistant</h1>
    <p id="description">
      Reads the job page you are viewing, then opens your referral web app.
    </p>
    <button id="findBtn">Find Referral</button>
    <div id="status" class="status"></div>
    <div class="row">
      Make sure the configured web app URL is available.
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
